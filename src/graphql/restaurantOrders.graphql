mutation addOrderedDishes(
  $quantity: String = ""
  $price: String = ""
  $order_id: uuid = ""
  $id: uuid = ""
  $dish_id: uuid = ""
) {
  insert_restaurant_order_items(
    objects: {
      quantity: $quantity
      price: $price
      order_id: $order_id
      dish_id: $dish_id
    }
  ) {
    affected_rows
  }
}

mutation addRestaurantOrders(
  $delivery_address_id: uuid = ""
  $delivery_fee: String = ""
  $delivery_notes: String = ""
  $delivery_time: String = ""
  $discount: String = ""
  $status: String = ""
  $total: String = ""
  $user_id: uuid = ""
  $voucher_code: String = ""
  $shopper_id: uuid = ""
  $restaurant_id: uuid = ""
  $pin: String = ""
  $delivery_photo_url: String = ""
  $assigned_at: timestamptz = ""
  $combined_order_id: uuid = ""
  $OrderID: Int = 10
  $updated_at: timestamptz = ""
) {
  insert_restaurant_orders(
    objects: {
      delivery_address_id: $delivery_address_id
      delivery_fee: $delivery_fee
      delivery_notes: $delivery_notes
      delivery_time: $delivery_time
      discount: $discount
      status: $status
      total: $total
      user_id: $user_id
      voucher_code: $voucher_code
      shopper_id: $shopper_id
      restaurant_id: $restaurant_id
      pin: $pin
      delivery_photo_url: $delivery_photo_url
      combined_order_id: $combined_order_id
      assigned_at: $assigned_at
      OrderID: $OrderID
      updated_at: $updated_at
    }
  ) {
    affected_rows
  }
}

query GetRestaurantOrders($user_id: uuid!) {
  restaurant_orders(
    where: { user_id: { _eq: $user_id } }
    order_by: { created_at: desc }
  ) {
    id
    OrderID
    user_id
    status
    created_at
    total
    delivery_fee
    restaurant_id
    shopper_id
    delivery_time
    delivery_notes
    discount
    discount
    voucher_code
    combined_order_id
    delivery_address_id
    delivery_photo_url
    updated_at
    orderedBy {
      created_at
      email
      gender
      id
      is_active
      name
      phone
      role
      updated_at
      is_guest
      password_hash
      profile_picture
    }
    Address {
      city
      created_at
      id
      is_default
      latitude
      longitude
      postal_code
      street
      updated_at
      user_id
      placeDetails
      type
    }
    Restaurant {
      created_at
      is_active
      email
      id
      lat
      location
      logo
      long
      name
      phone
      profile
      relatedTo
      tin
      ussd
      verified
      rdb_cert
    }
    assigned_at
    pin
    shoppers {
      Employment_id
      Police_Clearance_Cert
      SignaturePad
      active
      address
      collection_comment
      courier
      created_at
      driving_license
      driving_license_back
      full_name
      face_verified
      face_liveness_images
      email
      guarantor
      guarantorRelationship
      guarantorPhone
      national_id
      mutual_status
      longitude
      mutual_StatusCertificate
      national_id_photo_front
      phone
      phone_number
      plate_number
      profile_photo
      proofOfResidency
      signature
      status
      user_id
      verification_metadata
      transport_mode
    }
  }
}

