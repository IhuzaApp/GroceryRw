query getAllWallettTtransactions {
  Wallet_Transactions {
    wallet_id
    type
    status
    related_order_id
    id
    created_at
    amount
    Wallet {
      shopper_id
      reserved_balance
      last_updated
      id
      available_balance
    }
    Order {
      OrderID
      updated_at
      user_id
      voucher_code
      total
      status
      shopper_id
      shop_id
      service_fee
      id
      discount
      delivery_time
      delivery_photo_url
      delivery_notes
      delivery_fee
      delivery_address_id
      created_at
      combined_order_id
      assigned_at
    }
    description
    related_reel_orderId
    related_restaurant_order_id
    mtn_response
    phone
    reference_id
    relate_business_order_id
  }
}

mutation createWalletTransaction(
  $amount: String!
  $type: String!
  $status: String!
  $wallet_id: uuid!
  $related_order_id: uuid
  $currency: String = ""
  $description: String = ""
  $phone: String = ""
  $mtn_response: String = ""
  $reference_id: String = ""
  $relate_business_order_id: uuid = ""
  $related_restaurant_order_id: uuid = ""
  $related_reel_orderId: uuid = ""
) {
  insert_Wallet_Transactions_one(
    object: {
      amount: $amount
      type: $type
      status: $status
      wallet_id: $wallet_id
      related_order_id: $related_order_id
      currency: $currency
      description: $description
      phone: $phone
      mtn_response: $mtn_response
      reference_id: $reference_id
      relate_business_order_id: $relate_business_order_id
      related_restaurant_order_id: $related_restaurant_order_id
      related_reel_orderId: $related_reel_orderId
    }
  ) {
    id
    amount
    type
    status
    created_at
    wallet_id
    related_order_id
    related_reel_orderId
    related_restaurant_order_id
    description
    mtn_response
    phone
    reference_id
    relate_business_order_id
    currency
  }
}

mutation createMultipleWalletTransactions(
  $transactions: [Wallet_Transactions_insert_input!]!
) {
  insert_Wallet_Transactions(objects: $transactions) {
    returning {
      id
      amount
      type
      status
      created_at
      wallet_id
      related_order_id
      description
      related_reel_orderId
      related_restaurant_order_id
      currency
      mtn_response
      phone
      reference_id
      relate_business_order_id
    }
    affected_rows
  }
}
